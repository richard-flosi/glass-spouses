        <style>
          :root {
            --animation-duration: 36s;
            --transition: all 3s linear;
          }
          #stars {
            overflow: hidden;
            fill: white;
            transition: var(--transition);
            animation-name: stars;
            animation-duration: var(--animation-duration);
            animation-iteration-count: infinite;
            animation-play-state: running;
          }
          @keyframes stars {
            0% { transform: translateX(-10%); opacity: 1; }
            25% { transform: translateX(25%); opacity: 0.1; }
            33% { transform: translateX(33%); opacity: 0; }
            50% { transform: translateX(50%); opacity: 0; }
            66% { transform: translateX(-100%); opacity: 0; }
            75% { transform: translateX(-25%); opacity: 0.1; }
            100% { transform: translateX(-10%); opacity: 1; }
          }
          #sky {
            width: 100%;
            height: 75%;
            transition: var(--transition);
            animation-name: sky;
            animation-duration: var(--animation-duration);
            animation-iteration-count: infinite;
            animation-play-state: running;
          }
          @keyframes sky {
            0% { fill: transparent; opacity: 0; }
            14% { fill: midnightblue; opacity: 0.3; }
            28% { fill: gold; opacity: 0.6; }
            35% { fill: skyblue; opacity: 0.7; }
            42% { fill: skyblue; opacity: 0.9; }
            49% { fill: skyblue; opacity: 1; }
            56% { fill: skyblue; opacity: 0.7; }
            70% { fill: darkorange; opacity: 0.6; }
            84% { fill: midnightblue; opacity: 0.3; }
            100% { fill: transparent; opacity: 0; }
          }
          #sun {
            transition: var(--transition);
            animation-name: sun;
            animation-duration: var(--animation-duration);
            animation-iteration-count: infinite;
            animation-play-state: running;
          }
          @keyframes sun {
            0% { cx: -20%; cy: 49%; r: 7%; fill: orange; }
            25% { cx: 33%; cy: 36%; r: 12%; fill: gold; }
            50% { cx: 50%; cy: 26%; r: 15%; fill: lightyellow; }
            75% { cx: 66%; cy: 36%; r: 12%; fill: orangered; }
            100% { cx: 120%; cy: 49%; r: 7%; fill: red; }
          }
          #moon {
            fill: lightyellow;
            opacity: 0.9;
            transition: var(--transition);
            animation-name: moon;
            animation-duration: var(--animation-duration);
            animation-delay: calc(var(--animation-duration) / 2);
            animation-iteration-count: infinite;
            animation-play-state: running;
          }
          @keyframes moon {
            0% { cx: -20%; cy: 49%; r: 7%; }
            25% { cx: 33%; cy: 36%; r: 12%; }
            50% { cx: 50%; cy: 26%; r: 15%; }
            75% { cx: 66%; cy: 36%; r: 12%; }
            100% { cx: 120%; cy: 49%; r: 7%; }
          }
          #clouds {
            fill: white;
            transition: var(--transition);
            animation-name: clouds;
            animation-duration: var(--animation-duration);
            animation-iteration-count: infinite;
            animation-play-state: running;
          }
          @keyframes clouds {
            0% { transform: translateX(100%); display: block; opacity: 0.97; }
            25% { transform: translateX(0%); display: block; opacity: 0.97; }
            50% { transform: translateX(-50%); display: block; opacity: 0.97; }
            75% { transform: translateX(-75%); display: block; opacity: 0.97; }
            98% { transform: translateX(-200%); display: block; opacity: 0.97; }
            99% { transform: translateX(-200%); display: none; opacity: 0; }
            100% { transform: translateX(100%); display: none; opacity: 0; }
          }
          #ocean {
            fill: blue;
            width: 100%;
            height: 25%;
          }
          #boat {
            opacity: 0;
            fill: brown;
            transition: var(--transition);
            animation-name: boat;
            animation-duration: var(--animation-duration);
            animation-delay: calc(var(--animation-duration) / 4);
            animation-iteration-count: infinite;
            animation-play-state: running;
          }
          @keyframes boat {
            0% { transform: translateX(-100%); display: block; opacity: 1; }
            25% { transform: translateX(-25%); display: block; opacity: 1; }
            50% { transform: translateX(0%); display: block; opacity: 1; }
            75% { transform: translateX(25%); display: block; opacity: 1; }
            98% { transform: translateX(100%); display: block; opacity: 1; }
            99% { transform: translateX(100%); display: none; opacity: 0; }
            100% { transform: translateX(-100%); display: none; opacity: 0; }
          }
          #glass-spouses {
            font-size: 40%;
            font-family: 'Text Me One', sans-serif;
            font-weight: bold;
            fill: skyblue;
            transition: var(--transition);
            animation-name: glass-spouses;
            animation-duration: var(--animation-duration);
            animation-iteration-count: infinite;
            animation-play-state: running;
          }
          @keyframes glass-spouses {
            0% { display: none; opacity: 0; }
            20% { display: block; opacity: 0; }
            25% { display: block; opacity: 1; }
            30% { display: block; opacity: 0; }
            100% { display: none; opacity: 0; }
          }
          #featuring {
            font-size: 35%;
            font-family: 'Text Me One', sans-serif;
            font-weight: bold;
            fill:gold;
            transition: var(--transition);
            animation-name: featuring;
            animation-duration: var(--animation-duration);
            animation-iteration-count: infinite;
            animation-play-state: running;
          }
          @keyframes featuring {
            0% { display: none; opacity: 0; }
            45% { display: block; opacity: 0; }
            50% { display: block; opacity: 1; }
            55% { display: block; opacity: 0; }
            100% { display: none; opacity: 0; }
          }
          #laura-cooper {
            font-size: 35%;
            font-family: 'Text Me One', sans-serif;
            font-weight: bold;
            fill:black;
            transition: var(--transition);

            animation-iteration-count: infinite;
