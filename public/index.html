          <style>
            :root {
              --animation-duration: 48s;
              --transition: all 3s linear;
            }
            #stars {
              overflow: hidden;
              fill: white;
              transition: var(--transition);
              animation-name: stars;
              animation-duration: var(--animation-duration);
              animation-iteration-count: infinite;
              animation-play-state: running;
            }
            @keyframes stars {
              0% { transform: translateX(-10%); opacity: 1; }
              25% { transform: translateX(25%); opacity: 0.1; }
              33% { transform: translateX(33%); opacity: 0; }
              50% { transform: translateX(50%); opacity: 0; }
              66% { transform: translateX(-100%); opacity: 0; }
              75% { transform: translateX(-25%); opacity: 0.1; }
              100% { transform: translateX(-10%); opacity: 1; }
            }
            #sky {
              width: 100%;
              height: 75%;
              transition: var(--transition);
              animation-name: sky;
              animation-duration: var(--animation-duration);
              animation-iteration-count: infinite;
              animation-play-state: running;
            }
            @keyframes sky {
              0% { fill: transparent; opacity: 0; }
              14% { fill: midnightblue; opacity: 0.3; }
              28% { fill: gold; opacity: 0.6; }
              35% { fill: skyblue; opacity: 0.7; }
              42% { fill: skyblue; opacity: 0.9; }
              49% { fill: skyblue; opacity: 1; }
              56% { fill: skyblue; opacity: 0.7; }
              70% { fill: darkorange; opacity: 0.6; }
              84% { fill: midnightblue; opacity: 0.3; }
              100% { fill: transparent; opacity: 0; }
            }
            #sun {
              transition: var(--transition);
              animation-name: sun;
              animation-duration: var(--animation-duration);
              animation-iteration-count: infinite;
              animation-play-state: running;
            }
            @keyframes sun {
              0% { cx: -20%; cy: 49%; r: 7%; fill: orange; }
              25% { cx: 33%; cy: 36%; r: 12%; fill: gold; }
              50% { cx: 50%; cy: 26%; r: 15%; fill: lightyellow; }
              75% { cx: 66%; cy: 36%; r: 12%; fill: orangered; }
              100% { cx: 120%; cy: 49%; r: 7%; fill: red; }
            }
            #ocean {
              fill: blue;
              width: 100%;
              height: 25%;
            }
